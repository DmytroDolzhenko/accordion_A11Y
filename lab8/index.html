<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <h1>Hello World</h1>
    <div role="tablist">
    <button id="tab1" class="button" role="tab" aria-selected="true" aria-controls="panel1">Tab 1</button>
    <button id="tab2" class="button" role="tab" aria-selected="false" aria-controls="panel2">Tab 2</button>
    <button id="tab3" class="button" role="tab" aria-selected="false" aria-controls="panel3">Tab 3</button>
</div>

<div id="panel1" role="tabpanel" aria-labelledby="tab1">
    <p>Content for Tab 1</p>
</div>
<div id="panel2" role="tabpanel" aria-labelledby="tab2" hidden>
    <p>Content for Tab 2</p>
</div>
<div id="panel3" role="tabpanel" aria-labelledby="tab3" hidden>
<button id="open-dialog-btn" aria-haspopup="dialog" onclick="showModal()">
  Відкрити налаштування профілю
</button>

<div id="modal-container"
     role="dialog"
     aria-modal="true"
     aria-labelledby="modal-title"
     aria-describedby="modal-description"
     tabindex="-1"
     hidden>
  <div class="modal-content">
    <h2 id="modal-title">Редагування профілю</h2>
    <p id="modal-description">
      Будь ласка, введіть свої дані нижче. Всі поля є обов'язковими для заповнення.
    </p>
    <form>
      <label for="username">Ім'я користувача:</label>
      <input type="text" id="username" name="username">
      <label for="email">Електронна пошта:</label>
      <input type="email" id="email" name="email">
      <div class="button-group">
        <button type="submit" id="save-btn">Зберегти зміни</button>
        <button type="button" id="close-btn" onclick="hideModal()">Скасувати</button>
      </div>
    </form>
  </div>
</div>

</div>
    <script src="script.js"></script>
</body>
</html>
